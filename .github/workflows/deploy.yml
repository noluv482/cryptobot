name: Deploy to Home Server

on:
  push:
    branches:
      - claude/bot-scan-1amdiq
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy latest code
        run: |
          cd ~/cryptobot
          git fetch origin
          git checkout claude/bot-scan-1amdiq
          git pull origin claude/bot-scan-1amdiq
          docker compose build --no-cache bot
          docker compose up -d bot
          echo "Deploy complete at $(date)"
          docker ps | grep cryptobot-bot
