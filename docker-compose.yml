version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cryptobot
      POSTGRES_USER: cryptobot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptobot"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./data:/data
    environment:
      TG_TOKEN: ${TG_TOKEN}
      TG_CHAT_ID: ${TG_CHAT_ID}
      DASHBOARD_PIN: ${DASHBOARD_PIN}
      DATABASE_URL: postgresql://cryptobot:${DB_PASSWORD}@db:5432/cryptobot
      DATA_DIR: /data
      # Optional — leave blank to use dashboard API Keys instead
      KRAKEN_KEY: ${KRAKEN_KEY:-}
      KRAKEN_SECRET: ${KRAKEN_SECRET:-}
      DISCORD_WEBHOOK: ${DISCORD_WEBHOOK:-}
      # Optional — enables AI-powered news sentiment (Claude Haiku); falls back to keywords if blank
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_started

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # Quick tunnel (no account needed) — URL printed in logs on startup.
    # For a permanent URL: create a tunnel at dash.cloudflare.com, copy the
    # token into .env as CLOUDFLARE_TUNNEL_TOKEN, then change the command to:
    #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate --url http://bot:8080
    depends_on:
      - bot
